apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: image-updater
  namespace: argocd
spec:
  namespace: argocd  # Target namespace where Argo CD Applications are located
  applicationRefs:
    - namePattern: "j26-app"  # Select applications matching this pattern
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-app"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-map"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-map"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-auth"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-auth"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-booking"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-booking"
          commonUpdateSettings:
            updateStrategy: "newest-build"
        - alias: "migrate"
          imageName: "ghcr.io/scouterna/j26-booking-migrate"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-platsbank"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-platsbank"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-cms"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-cms"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-signupinfo"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-signupinfo"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-screens"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-screens"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-scoutin-2"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-scoutin-2"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-notifications"
      images:
        - alias: "api"
          imageName: "ghcr.io/scouterna/j26-notifications"
          commonUpdateSettings:
            updateStrategy: "newest-build"
        - alias: "client"
          imageName: "ghcr.io/scouterna/j26-notifications-client"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-photo-permission"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-photo-permission"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-bracelet-checker"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-bracelet-checker"
          commonUpdateSettings:
            updateStrategy: "newest-build"

    - namePattern: "j26-interactive-screens"
      images:
        - alias: "app"
          imageName: "ghcr.io/scouterna/j26-interactive-screens-v2"
          commonUpdateSettings:
            updateStrategy: "newest-build"
