# Production Application for j26-cms (Payload headless CMS).
#
# Name is `j26-cms-prod` (NOT `j26-cms`) on purpose: the dev Application owns the plain name, and the
# `-prod` suffix keeps this out of the argocd-image-updater (same rationale as j26-app-prod). The prod
# image is pinned to 0.1.0 in the overlay's kustomize `images:` field and bumped by an explicit Git
# commit. Kustomize overlay on the dev base; deployed into j26-prod.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: j26-cms-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: prod
  source:
    repoURL: https://github.com/Scouterna/j26-infra.git
    targetRevision: main
    path: k8s/app-manifest-prod/j26-cms
  destination:
    server: https://kubernetes.default.svc
    namespace: j26-prod
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
