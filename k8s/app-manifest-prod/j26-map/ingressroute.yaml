# Prod route for j26-map. StripPrefix because the static app is served at root (like dev's
# rewrite-target /$2). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-map-prefix
spec:
  stripPrefix:
    prefixes:
      - /_services/map
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-map
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/map`) || PathPrefix(`/_services/map/`))
      middlewares:
        - name: strip-map-prefix
      services:
        - name: j26-map
          port: 80
  tls:
    secretName: j26-app-tls-secret
