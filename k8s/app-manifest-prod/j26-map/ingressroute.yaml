# PRODUCTION ingress for j26-map — Traefik IngressRoute on app.jamboree.se/_services/map.
# Added by the prod overlay; the base nginx Ingress is deleted ($patch: delete in
# kustomization.yaml). Namespace is injected by the overlay's `namespace:` field.
#
# Dev nginx STRIPS the prefix (rewrite-target /$2) — the static app is served at root — so prod
# uses a StripPrefix middleware. Coexists with j26-app `/` (Traefik longest match). TLS reuses the
# existing j26-app-tls-secret (cert-manager already issued it for app.jamboree.se).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-map-prefix
spec:
  stripPrefix:
    prefixes:
      - /_services/map
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-map
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/map`) || PathPrefix(`/_services/map/`))
      middlewares:
        - name: strip-map-prefix
      services:
        - name: j26-map
          port: 80
  tls:
    secretName: j26-app-tls-secret
