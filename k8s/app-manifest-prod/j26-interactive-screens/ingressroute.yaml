# Prod route for j26-interactive-screens. No StripPrefix — the app keeps its base
# path (dev's rewrite-target is /_services/interactive-screens/$2, i.e. the prefix
# is preserved). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-interactive-screens
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/interactive-screens`) || PathPrefix(`/_services/interactive-screens/`))
      services:
        - name: j26-interactive-screens
          port: 80
  tls:
    secretName: j26-app-tls-secret
