# Prod-only SecretProviderClass. Dev sources the DB from an Azure Service Connector
# secret (sc-postgresql5a98c-secret); prod instead materialises a full DATABASE_URL
# DSN from KV and injects it via CSI (see deployment-patch.yaml). The CSI volume
# mount added in the deployment patch is what triggers this secret to sync.
# NOTE: the j26-prod-bracelet-checker-postgres-dsn object must exist in
# kv-j26apps-shared-sdc, and the prod database must be provisioned, before sync.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-bracelet-checker-kv-csi
spec:
  provider: azure
  secretObjects:
    - secretName: j26-bracelet-checker-secrets
      type: Opaque
      data:
        - key: DATABASE_URL
          objectName: j26-prod-bracelet-checker-postgres-dsn
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-prod-bracelet-checker-postgres-dsn
          objectType: secret
