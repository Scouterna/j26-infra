apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-bracelet-checker. References the dev package as a base
# and patches only what differs in prod: namespace, image tag, ingress (Traefik),
# the auth issuer, and the database wiring. Unlike dev (which composes DATABASE_URL
# from an Azure Service Connector secret), prod sources DATABASE_URL from a KV
# object via CSI — matching cms/booking/platsbank/scoutin-2/interactive-screens.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-bracelet-checker
  - ingressroute.yaml
  # New in prod: the base has no SecretProviderClass (dev used a Service Connector).
  - secret-provider-class.yaml

# Pinned production image tag — bumped by an explicit commit, never by the
# image updater (see prod-apps/j26-bracelet-checker.yaml).
images:
  - name: ghcr.io/scouterna/j26-bracelet-checker
    newTag: "1.0.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-bracelet-checker
      $patch: delete
  # Swap the dev Service Connector DB wiring for a CSI-injected DATABASE_URL on
  # both the migrate initContainer and the app container.
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: j26-bracelet-checker

# Override only the prod-specific ConfigMap values. Merging by name into the
# existing (non-generated) ConfigMap does not add a hash suffix, so the
# Deployment's envFrom.configMapRef.name stays valid.
configMapGenerator:
  - name: j26-bracelet-checker-config
    behavior: merge
    literals:
      - AUTH_ISSUER=https://j26.scoutid.se/realms/jamboree26
