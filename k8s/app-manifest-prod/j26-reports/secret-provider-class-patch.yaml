# Prod: pull the five Scoutnet API keys from the prod KV objects instead of the
# dev ones. The Kubernetes secret name (j26-reports-secrets) is unchanged, so the
# base Deployment's secretRef stays valid. Both the secretObjects.data objectNames
# and the parameters.objects array are restated (kustomize replaces these blocks).
# NOTE: the j26-prod-reports-* objects must exist in kv-j26apps-shared-sdc before sync.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-reports-kv-csi
spec:
  secretObjects:
    - secretName: j26-reports-secrets
      type: Opaque
      data:
        - key: STAFF_MEMBER_KEY
          objectName: j26-prod-reports-staff-member-key
        - key: STAFF_QUESTION_KEY
          objectName: j26-prod-reports-staff-question-key
        - key: PARTICIPANTS_MEMBER_KEY
          objectName: j26-prod-reports-participants-member-key
        - key: PARTICIPANTS_QUESTION_KEY
          objectName: j26-prod-reports-participants-question-key
        - key: PARTICIPANTS_GROUP_KEY
          objectName: j26-prod-reports-participants-group-key
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-reports-staff-member-key
          objectType: secret
        - |
          objectName: j26-prod-reports-staff-question-key
          objectType: secret
        - |
          objectName: j26-prod-reports-participants-member-key
          objectType: secret
        - |
          objectName: j26-prod-reports-participants-question-key
          objectType: secret
        - |
          objectName: j26-prod-reports-participants-group-key
          objectType: secret
