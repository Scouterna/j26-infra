# Prod patch for the j26-scoutid-sync SecretProviderClass: repoint the Keycloak
# client secret from the dev object (scoutid-sync-keycloak-client-secret) to the
# prod one (j26-prod-group-import-keycloak-client-secret) — the secret config-cli
# set on the j26-group-import client in the jamboree26 realm on j26.scoutid.se.
# The two Scoutnet API keys are the SAME source data in prod, so they keep the
# existing scoutid-sync-scoutnet-* objects (not duplicated). objectName appears in
# both secretObjects.data and the parameters.objects scalar — all three restated.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-scoutid-sync-kv-csi
spec:
  secretObjects:
    - secretName: j26-scoutid-sync-secrets
      type: Opaque
      data:
        - key: KEYCLOAK_CLIENT_SECRET
          objectName: j26-prod-group-import-keycloak-client-secret
        - key: SCOUTNET_MEMBERS_API_KEY
          objectName: scoutid-sync-scoutnet-members-api-key
        - key: SCOUTNET_QUESTIONS_API_KEY
          objectName: scoutid-sync-scoutnet-questions-api-key
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-group-import-keycloak-client-secret
          objectType: secret
        - |
          objectName: scoutid-sync-scoutnet-members-api-key
          objectType: secret
        - |
          objectName: scoutid-sync-scoutnet-questions-api-key
          objectType: secret
