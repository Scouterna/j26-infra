# Prod: use the prod Keycloak client-secret KV object. The Scoutnet API keys are the
# same in prod, so they keep their dev KV objects.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-scoutid-sync-kv-csi
spec:
  secretObjects:
    - secretName: j26-scoutid-sync-secrets
      type: Opaque
      data:
        - key: KEYCLOAK_CLIENT_SECRET
          objectName: j26-prod-group-import-keycloak-client-secret
        - key: SCOUTNET_MEMBERS_API_KEY
          objectName: scoutid-sync-scoutnet-members-api-key
        - key: SCOUTNET_QUESTIONS_API_KEY
          objectName: scoutid-sync-scoutnet-questions-api-key
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-group-import-keycloak-client-secret
          objectType: secret
        - |
          objectName: scoutid-sync-scoutnet-members-api-key
          objectType: secret
        - |
          objectName: scoutid-sync-scoutnet-questions-api-key
          objectType: secret
