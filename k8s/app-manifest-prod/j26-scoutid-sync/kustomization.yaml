apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Self-contained prod package for the merged j26-scoutid-sync app (staff + participants CronJobs).
# Does NOT reference the dev base — every manifest, including the assignment config + CSVs that
# drive ~18k prod group memberships, is a prod copy. So no dev-side change can silently reach prod;
# genuine dev fixes must be carried over deliberately. Schedules are skewed off the dev twins
# (staff :15, participants :45) so dev and prod don't run heavy syncs at the same time on one node.
namespace: j26-prod

resources:
  - configmap.yaml
  - cron-job.yaml
  - secret-provider-class.yaml
  - configmap-participants.yaml
  - cron-job-participants.yaml
  - secret-provider-class-participants.yaml

# Shared prod image for both CronJobs. Bumped by an explicit commit (the -prod app is excluded from
# the image updater). The CronJob manifests carry only a placeholder tag; the real tag is set here.
images:
  - name: ghcr.io/scouterna/j26-scoutid-sync
    newTag: "0.2.1"

configMapGenerator:
  - name: j26-scoutid-sync-config-file
    files:
      - config.yml
      - function_slugs.csv
  - name: j26-scoutid-sync-participants-config-file
    files:
      - config-participants.yml
      - group_mappings.csv
