apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for the merged j26-scoutid-sync app (both the staff/funktionär and
# the participants CronJobs — merged into one base in #33). References the merged dev
# base and patches only the prod differences for each of the two jobs:
#   - namespace: j26-prod
#   - single shared image pinned to the semver 0.2.0 (prod uses semver; dev base tracks
#     the immutable sha tag)
#   - per-job ConfigMap: prod Keycloak admin host + prod parent group UUID
#   - per-job SecretProviderClass: prod KC client-secret object
#   - per-job schedule skewed off the dev twins (dev staff :00 / participants :30) so
#     dev and prod never run heavy syncs simultaneously on the shared single node:
#     dev-staff :00 → prod-staff :15 → dev-participants :30 → prod-participants :45
namespace: j26-prod

resources:
  - ../../app-manifest/j26-scoutid-sync

# Shared pinned image for BOTH CronJobs — prod convention is a semver tag (0.2.0 ==
# the dev base's sha-4328a96). Bumped by an explicit Git commit, never the image
# updater (the -prod ArgoCD app is excluded from it).
images:
  - name: ghcr.io/scouterna/j26-scoutid-sync
    newTag: "0.2.0"

patches:
  # --- staff / funktionär ---
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-scoutid-sync-kv-csi
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "15 * * * *"
    target:
      kind: CronJob
      name: j26-scoutid-sync
  # --- participants ---
  - path: secret-provider-class-participants-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-scoutid-sync-participants-kv-csi
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "45 * * * *"
    target:
      kind: CronJob
      name: j26-scoutid-sync-participants

# Override only the prod-specific keys on each env ConfigMap; all other keys inherited
# from the base unchanged. Merging by name into the non-generated ConfigMaps adds no
# hash suffix, so the CronJobs' envFrom.configMapRef stays valid.
#   - KEYCLOAK_BASE_URL: prod admin host (dev = admin.id.dev.j26.se)
#   - KEYCLOAK_PARENT_GROUP_ID: /j26-scoutid-sync group UUID in the PROD jamboree26 realm
configMapGenerator:
  - name: j26-scoutid-sync-config
    behavior: merge
    literals:
      - KEYCLOAK_BASE_URL=https://admin.j26.scoutid.se
      - KEYCLOAK_PARENT_GROUP_ID=2f0deedd-16ea-417e-a60f-7b21a3745684
  - name: j26-scoutid-sync-participants-config
    behavior: merge
    literals:
      - KEYCLOAK_BASE_URL=https://admin.j26.scoutid.se
      - KEYCLOAK_PARENT_GROUP_ID=2f0deedd-16ea-417e-a60f-7b21a3745684
