apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for the merged j26-scoutid-sync app (staff + participants CronJobs).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-scoutid-sync

# Shared prod image for both CronJobs. Bumped by an explicit commit (the -prod app is
# excluded from the image updater).
images:
  - name: ghcr.io/scouterna/j26-scoutid-sync
    newTag: "0.2.1"

patches:
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-scoutid-sync-kv-csi
  - path: secret-provider-class-participants-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-scoutid-sync-participants-kv-csi
  # Schedules skewed off the dev twins (dev :00/:30) so dev and prod don't run heavy
  # syncs at the same time on the single node.
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "15 * * * *"
    target:
      kind: CronJob
      name: j26-scoutid-sync
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "45 * * * *"
    target:
      kind: CronJob
      name: j26-scoutid-sync-participants

configMapGenerator:
  - name: j26-scoutid-sync-config
    behavior: merge
    literals:
      - KEYCLOAK_BASE_URL=https://admin.j26.scoutid.se
      - KEYCLOAK_PARENT_GROUP_ID=2f0deedd-16ea-417e-a60f-7b21a3745684
  - name: j26-scoutid-sync-participants-config
    behavior: merge
    literals:
      - KEYCLOAK_BASE_URL=https://admin.j26.scoutid.se
      - KEYCLOAK_PARENT_GROUP_ID=2f0deedd-16ea-417e-a60f-7b21a3745684
