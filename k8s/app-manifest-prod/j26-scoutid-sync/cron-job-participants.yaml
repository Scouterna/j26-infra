apiVersion: batch/v1
kind: CronJob
metadata:
  name: j26-scoutid-sync-participants
spec:
  schedule: "45 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: scoutid-sync
              # Tag is a placeholder — the real tag is set once in kustomization.yaml
              # (images:), shared by both CronJobs. Do not pin a tag here.
              image: ghcr.io/scouterna/j26-scoutid-sync:placeholder
              envFrom:
                - configMapRef:
                    name: j26-scoutid-sync-participants-config
                - secretRef:
                    name: j26-scoutid-sync-participants-secrets
              volumeMounts:
                - name: secrets-store
                  mountPath: "/mnt/secrets-store"
                  readOnly: true
                - name: config-file
                  mountPath: /app/config.yml
                  # The participants config file is config-participants.yml in the
                  # shared dir (to coexist with the funktionär config.yml); mount it
                  # AS /app/config.yml, which is what the binary reads.
                  subPath: config-participants.yml
                  readOnly: true
                - name: config-file
                  mountPath: /app/group_mappings.csv
                  subPath: group_mappings.csv
                  readOnly: true
          volumes:
            - name: secrets-store
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: j26-scoutid-sync-participants-kv-csi
            - name: config-file
              configMap:
                name: j26-scoutid-sync-participants-config-file
