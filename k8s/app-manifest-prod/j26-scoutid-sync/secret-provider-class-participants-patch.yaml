# Prod patch for the j26-scoutid-sync-participants SecretProviderClass: repoint the
# Keycloak client secret from the dev object (scoutid-sync-keycloak-client-secret) to
# the prod one (j26-prod-group-import-keycloak-client-secret) — same j26-group-import
# client on j26.scoutid.se. The two participants Scoutnet API keys
# (scoutid-sync-participants-scoutnet-*-api-key) are the same source data in prod, so
# they keep their existing KV objects (not duplicated). objectName appears in both
# secretObjects.data and the parameters.objects scalar — all three restated.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-scoutid-sync-participants-kv-csi
spec:
  secretObjects:
    - secretName: j26-scoutid-sync-participants-secrets
      type: Opaque
      data:
        - key: KEYCLOAK_CLIENT_SECRET
          objectName: j26-prod-group-import-keycloak-client-secret
        - key: SCOUTNET_MEMBERS_API_KEY
          objectName: scoutid-sync-participants-scoutnet-members-api-key
        - key: SCOUTNET_QUESTIONS_API_KEY
          objectName: scoutid-sync-participants-scoutnet-questions-api-key
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-group-import-keycloak-client-secret
          objectType: secret
        - |
          objectName: scoutid-sync-participants-scoutnet-members-api-key
          objectType: secret
        - |
          objectName: scoutid-sync-participants-scoutnet-questions-api-key
          objectType: secret
