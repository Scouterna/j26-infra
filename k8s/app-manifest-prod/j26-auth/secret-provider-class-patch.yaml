# Prod patch for the j26-auth SecretProviderClass: repoint from the dev KV object
# (keycloak-auth-client-secret) to the prod one (j26-prod-auth-keycloak-client-secret),
# which holds the secret keycloak-config-cli set on the j26-auth client in the
# jamboree26 realm on id.j26.scoutid.se. The objectName appears in two places —
# secretObjects.data and the parameters.objects scalar — both restated here.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-auth-kv-csi
spec:
  secretObjects:
    - secretName: j26-auth-secrets
      type: Opaque
      data:
        - key: OIDC_CLIENT_SECRET
          objectName: j26-prod-auth-keycloak-client-secret
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-auth-keycloak-client-secret
          objectType: secret
