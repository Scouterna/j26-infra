apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for j26-auth. References the dev package as a base (left
# untouched) and patches only what differs in prod, mirroring the j26-app prod
# overlay. Prod differences:
#   - namespace: j26-prod
#   - ConfigMap: prod OIDC server (id.j26.scoutid.se), host (app.jamboree.se), and
#     allowed redirect domains
#   - SecretProviderClass: prod KV client-secret object name
#   - ingress: dev's nginx Ingress is removed and replaced by a Traefik IngressRoute
#     + StripPrefix middleware (a different kind, so it can't be strategic-merged the
#     way j26-app swaps its Ingress in place)
namespace: j26-prod

resources:
  - ../../app-manifest/j26-auth
  # Traefik routing added on top of the base (the base nginx Ingress is deleted
  # by the $patch: delete below).
  - ingressroute.yaml

# Pinned production image tag — bumped by an explicit commit, never by the image
# updater (see prod-apps/j26-auth.yaml). The dev base tracks :latest; prod pins a
# released version.
images:
  - name: ghcr.io/scouterna/j26-auth
    newTag: "1.0.0"

patches:
  # Delete the base nginx Ingress entirely — prod uses a Traefik IngressRoute
  # (different kind) defined in ingressroute.yaml, not an Ingress.
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-auth
      $patch: delete
  # Repoint the SecretProviderClass at the prod KV client-secret object. The
  # objectName appears in two places (secretObjects.data and the parameters.objects
  # scalar); both are restated here. Same approach as j26-app restating its full
  # ingress rules block.
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-auth-kv-csi

# Override only the dev-specific ConfigMap values; all other keys are inherited
# from the base ConfigMap unchanged. Merging by name into the existing
# (non-generated) ConfigMap does not add a hash suffix, so the Deployment's
# envFrom.configMapRef.name stays valid.
configMapGenerator:
  - name: j26-auth-config
    behavior: merge
    literals:
      - PUBLIC_URL=https://app.jamboree.se/auth
      - ALLOWED_REDIRECT_DOMAINS=app.jamboree.se
      - OIDC_SERVER=https://j26.scoutid.se/realms/jamboree26
