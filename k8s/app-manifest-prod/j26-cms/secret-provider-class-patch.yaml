# Prod patch for the j26-cms SecretProviderClass. Two changes vs the dev base (which only carried
# the Payload secret and sourced the DB from the Service Connector secret sc-postgresqlccec9-secret):
#   1. Repoint PAYLOAD_SECRET → the prod KV object j26-prod-cms-payload-secret (fresh value).
#   2. ADD DATABASE_URL ← j26-prod-cms-postgres-dsn — prod drops Service Connector and pulls the DB
#      DSN straight from KV via CSI (j26-notifications pattern). The prod DB (j26_prod_cms,
#      role-owned) was created 2026-06-29.
# Both materialize into the SAME Secret j26-cms-secrets (name unchanged). objectName is restated in
# both secretObjects.data and the parameters.objects scalar.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-cms-kv-csi
spec:
  secretObjects:
    - secretName: j26-cms-secrets
      type: Opaque
      data:
        - key: PAYLOAD_SECRET
          objectName: j26-prod-cms-payload-secret
        - key: DATABASE_URL
          objectName: j26-prod-cms-postgres-dsn
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-cms-payload-secret
          objectType: secret
        - |
          objectName: j26-prod-cms-postgres-dsn
          objectType: secret
