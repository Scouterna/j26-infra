# Prod: repoint PAYLOAD_SECRET to the prod KV object, and add DATABASE_URL from the prod DB DSN
# (prod sources the DB via CSI instead of the dev Service Connector).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-cms-kv-csi
spec:
  secretObjects:
    - secretName: j26-cms-secrets
      type: Opaque
      data:
        - key: PAYLOAD_SECRET
          objectName: j26-prod-cms-payload-secret
        - key: DATABASE_URL
          objectName: j26-prod-cms-postgres-dsn
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-cms-payload-secret
          objectType: secret
        - |
          objectName: j26-prod-cms-postgres-dsn
          objectType: secret
