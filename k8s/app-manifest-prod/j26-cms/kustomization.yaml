apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-cms (Payload CMS). Unlike dev (Azure Service Connector), prod sources
# the DB DSN from Key Vault via CSI — see secret-provider-class-patch.yaml + deployment-patch.yaml.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-cms
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-cms
    newTag: "0.1.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-cms
      $patch: delete
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-cms-kv-csi
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: j26-cms

configMapGenerator:
  - name: j26-cms-config
    behavior: merge
    literals:
      - SERVER_URL=https://app.jamboree.se
