# Prod: source DATABASE_URL from the CSI secret, replacing the dev Service Connector env block.
# (The CSI volume/mount already exist in the base for the Payload secret.)
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: j26-cms-secrets
          key: DATABASE_URL
