# Prod route for j26-cms. No StripPrefix — the app keeps its base path. The buffering middleware
# caps request bodies at 50 MiB (mirrors dev's proxy-body-size: 50m for media uploads). Reuses the
# app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cms-body-limit
spec:
  buffering:
    maxRequestBodyBytes: 52428800   # 50 MiB, matches dev proxy-body-size: 50m
    memRequestBodyBytes: 2097152    # 2 MiB in memory before spilling to disk
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-cms
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/cms`) || PathPrefix(`/_services/cms/`))
      middlewares:
        - name: cms-body-limit
      services:
        - name: j26-cms
          port: 80
  tls:
    secretName: j26-app-tls-secret
