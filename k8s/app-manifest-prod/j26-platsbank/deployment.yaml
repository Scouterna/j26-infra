# Self-contained prod Deployment (no dev base). DATABASE_URL comes from the CSI-mounted secret
# (prod DB DSN in Key Vault), not the dev Azure Service Connector.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: j26-platsbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: j26-platsbank
  template:
    metadata:
      labels:
        app: j26-platsbank
    spec:
      initContainers:
        - name: j26-platsbank-init-migrate
          image: ghcr.io/scouterna/j26-platsbank:latest
          command: ["node_modules/.bin/prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: j26-platsbank-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: j26-platsbank-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      containers:
        - name: j26-platsbank-app
          image: ghcr.io/scouterna/j26-platsbank:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: j26-platsbank-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: j26-platsbank-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: j26-platsbank-kv-csi
