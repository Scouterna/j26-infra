# PRODUCTION ingress for j26-platsbank — Traefik IngressRoute on app.jamboree.se/_services/platsbank.
# Added by the prod overlay; the base nginx Ingress is deleted ($patch: delete in kustomization.yaml).
#
# Dev does NOT strip the prefix (rewrite-target /_services/platsbank/$2 — keeps it), so this route
# forwards the full path with NO StripPrefix (like notification-client / photo-permission).
# Coexists with j26-app `/` (Traefik longest match). TLS reuses the existing j26-app-tls-secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-platsbank
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/platsbank`) || PathPrefix(`/_services/platsbank/`))
      services:
        - name: j26-platsbank
          port: 80
  tls:
    secretName: j26-app-tls-secret
