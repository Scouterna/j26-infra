# Prod route for j26-platsbank. No StripPrefix — the app keeps its base path (like dev's
# rewrite-target /_services/platsbank/$2). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-platsbank
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/platsbank`) || PathPrefix(`/_services/platsbank/`))
      services:
        - name: j26-platsbank
          port: 80
  tls:
    secretName: j26-app-tls-secret
