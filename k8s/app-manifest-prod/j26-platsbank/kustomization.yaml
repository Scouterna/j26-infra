apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-platsbank. Unlike dev (Azure Service Connector), prod sources the DB
# DSN from Key Vault via CSI — see secret-provider-class.yaml + deployment-patch.yaml.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-platsbank
  - secret-provider-class.yaml
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-platsbank
    newTag: "0.1.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-platsbank
      $patch: delete
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: j26-platsbank
