apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Self-contained prod package for j26-platsbank (does NOT reference the dev base). Every manifest
# is a prod copy, so no dev-side change can reach prod — the tradeoff is that genuine dev fixes to
# the structural manifests must be carried over deliberately.
namespace: j26-prod

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - secret-provider-class.yaml
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-platsbank
    newTag: "0.1.1"
