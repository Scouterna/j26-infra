# Prod-only SPC (dev has none — it uses the Azure Service Connector). Materializes DATABASE_URL
# from the prod DB DSN in Key Vault; the deployment patch wires the container env from it.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-platsbank-kv-csi
spec:
  provider: azure
  secretObjects:
    - secretName: j26-platsbank-secrets
      type: Opaque
      data:
        - key: DATABASE_URL
          objectName: j26-prod-platsbank-postgres-dsn
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-prod-platsbank-postgres-dsn
          objectType: secret
