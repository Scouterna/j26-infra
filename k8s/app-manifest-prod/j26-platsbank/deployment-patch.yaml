# Prod: source DATABASE_URL from the CSI secret (drop the dev Service Connector secretRef) and
# add the CSI volume + mounts, on both the init-migrate and app containers.

# --- initContainer[0]: j26-platsbank-init-migrate ---
- op: replace
  path: /spec/template/spec/initContainers/0/envFrom
  value:
    - configMapRef:
        name: j26-platsbank-config
- op: replace
  path: /spec/template/spec/initContainers/0/env
  value:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: j26-platsbank-secrets
          key: DATABASE_URL
- op: add
  path: /spec/template/spec/initContainers/0/volumeMounts
  value:
    - name: secrets-store
      mountPath: /mnt/secrets-store
      readOnly: true

# --- container[0]: j26-platsbank-app ---
- op: replace
  path: /spec/template/spec/containers/0/envFrom
  value:
    - configMapRef:
        name: j26-platsbank-config
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: j26-platsbank-secrets
          key: DATABASE_URL
- op: add
  path: /spec/template/spec/containers/0/volumeMounts
  value:
    - name: secrets-store
      mountPath: /mnt/secrets-store
      readOnly: true

# --- pod volumes: add the CSI volume ---
- op: add
  path: /spec/template/spec/volumes
  value:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: j26-platsbank-kv-csi
