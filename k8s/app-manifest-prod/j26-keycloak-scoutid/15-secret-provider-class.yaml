# Azure Key Vault CSI driver — sources all cluster secrets for the PRODUCTION
# ScoutID Keycloak from kv-j26apps-shared-sdc. Self-contained prod copy (not a
# kustomize overlay): every objectName here is a j26-prod-* object, distinct from
# the dev manifest's j26-dev-* objects.
#
# Mounting this SecretProviderClass's volume in a pod is what triggers the CSI
# driver to materialize the three Secrets below (keycloak-db-csi,
# keycloak-admin-csi, keycloak-client-secrets-csi). These Secret NAMES match dev so
# the manifests' secretKeyRef blocks are identical between environments — isolation
# is by namespace (j26-prod) and by the j26-prod-* KV object names, not by Secret name.
#
# CSI gotcha (cluster-wide): the driver writes each Secret only when CREATING it and
# the AKS driver runs without rotation. If a KV value changes later, you must
# `kubectl -n j26-prod delete secret <name>` then restart the consumer.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-keycloak-scoutid-kv-csi
  namespace: j26-prod
spec:
  provider: azure
  secretObjects:
    - secretName: keycloak-db-csi
      type: Opaque
      data:
        - key: KC_DB_USERNAME
          objectName: j26-prod-scoutid-postgres-user
        - key: KC_DB_PASSWORD
          objectName: j26-prod-scoutid-postgres-password
    - secretName: keycloak-admin-csi
      type: Opaque
      data:
        - key: KC_BOOTSTRAP_ADMIN_USERNAME
          objectName: j26-prod-scoutid-keycloak-bootstrap-admin-username
        - key: KC_BOOTSTRAP_ADMIN_PASSWORD
          objectName: j26-prod-scoutid-keycloak-bootstrap-admin-password
        - key: MASTER_ADMIN_USERNAME
          objectName: j26-prod-scoutid-keycloak-master-admin-username
        - key: MASTER_ADMIN_PASSWORD
          objectName: j26-prod-scoutid-keycloak-master-admin-password
    # Confidential client secrets consumed by the keycloak-config-cli Job, which
    # SETS each client's secret to these values (secret: $(env:...) in 04-clients.yaml).
    - secretName: keycloak-client-secrets-csi
      type: Opaque
      data:
        - key: J26_AUTH_CLIENT_SECRET
          objectName: j26-prod-auth-keycloak-client-secret
        - key: J26_NOTIFICATIONS_CLIENT_SECRET
          objectName: j26-prod-notifications-keycloak-client-secret
        - key: J26_GROUP_IMPORT_CLIENT_SECRET
          objectName: j26-prod-group-import-keycloak-client-secret
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-prod-scoutid-postgres-user
          objectType: secret
        - |
          objectName: j26-prod-scoutid-postgres-password
          objectType: secret
        - |
          objectName: j26-prod-scoutid-keycloak-bootstrap-admin-username
          objectType: secret
        - |
          objectName: j26-prod-scoutid-keycloak-bootstrap-admin-password
          objectType: secret
        - |
          objectName: j26-prod-scoutid-keycloak-master-admin-username
          objectType: secret
        - |
          objectName: j26-prod-scoutid-keycloak-master-admin-password
          objectType: secret
        - |
          objectName: j26-prod-auth-keycloak-client-secret
          objectType: secret
        - |
          objectName: j26-prod-notifications-keycloak-client-secret
          objectType: secret
        - |
          objectName: j26-prod-group-import-keycloak-client-secret
          objectType: secret
