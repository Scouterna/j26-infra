apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-notifications (notification-api + notification-client).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-notifications
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-notifications
    newTag: "v0.2.0"
  - name: ghcr.io/scouterna/j26-notifications-client
    newTag: "v0.2.0"

patches:
  # Replace the base nginx Ingresses with Traefik IngressRoutes (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: notification-api
      $patch: delete
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: notification-client
      $patch: delete
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-notifications-kv-csi
  - path: servicemonitor-patch.yaml
    target:
      kind: ServiceMonitor
      name: j26-notifications

configMapGenerator:
  - name: notification-env-vars
    behavior: merge
    literals:
      - KC_API=https://admin.j26.scoutid.se
