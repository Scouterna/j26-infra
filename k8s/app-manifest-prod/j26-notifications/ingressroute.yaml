# Prod routes for j26-notifications. The API strips its prefix (StripPrefix also sets
# X-Forwarded-Prefix, which the FastAPI app needs); the client keeps its prefix (it's built with
# base=/_services/notification-client). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-notifications-prefix
spec:
  stripPrefix:
    prefixes:
      - /_services/notifications
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notification-api
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/notifications`) || PathPrefix(`/_services/notifications/`))
      middlewares:
        - name: strip-notifications-prefix
      services:
        - name: notification-api
          port: 8000
  tls:
    secretName: j26-app-tls-secret
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notification-client
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/notification-client`) || PathPrefix(`/_services/notification-client/`))
      services:
        - name: notification-client
          port: 80
  tls:
    secretName: j26-app-tls-secret
