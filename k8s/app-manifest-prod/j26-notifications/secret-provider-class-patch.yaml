# Prod: use prod KV objects for the DB DSN + Keycloak SA secret; FCM is reused from dev (not
# env-split).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-notifications-kv-csi
spec:
  secretObjects:
    - secretName: notification-secrets
      type: Opaque
      data:
        - key: FCM_CREDENTIALS_JSON
          objectName: notifications-fcm-credentials-json
        - key: KC_SA_ACCOUNT_KEY
          objectName: j26-prod-notifications-keycloak-client-secret
        - key: POSTGRES_DSN
          objectName: notifications-prod-postgres-dsn
  parameters:
    objects: |
      array:
        - |
          objectName: notifications-fcm-credentials-json
          objectType: secret
        - |
          objectName: j26-prod-notifications-keycloak-client-secret
          objectType: secret
        - |
          objectName: notifications-prod-postgres-dsn
          objectType: secret
