# Prod patch for the j26-notifications SecretProviderClass: repoint each KV object to its
# production source while materializing the SAME Secret `notification-secrets` (so the
# Deployment's `envFrom.secretRef` is unchanged). Three keys:
#   - POSTGRES_DSN        → notifications-prod-postgres-dsn (the only genuinely prod-specific
#                           object; prod DB j26_prod_notifications on psql-j26apps-shared-sdc)
#   - KC_SA_ACCOUNT_KEY   → j26-prod-notifications-keycloak-client-secret (REUSE the prod KC
#                           client secret config-cli set on the j26-notifications client in the
#                           jamboree26 realm on j26.scoutid.se — no separate notifications-prod-*
#                           KC object)
#   - FCM_CREDENTIALS_JSON → notifications-fcm-credentials-json (REUSE the dev object as-is;
#                           FCM/Firebase is not env-split)
# objectName appears in both secretObjects.data and the parameters.objects scalar — all restated.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-notifications-kv-csi
spec:
  secretObjects:
    - secretName: notification-secrets
      type: Opaque
      data:
        - key: FCM_CREDENTIALS_JSON
          objectName: notifications-fcm-credentials-json
        - key: KC_SA_ACCOUNT_KEY
          objectName: j26-prod-notifications-keycloak-client-secret
        - key: POSTGRES_DSN
          objectName: notifications-prod-postgres-dsn
  parameters:
    objects: |
      array:
        - |
          objectName: notifications-fcm-credentials-json
          objectType: secret
        - |
          objectName: j26-prod-notifications-keycloak-client-secret
          objectType: secret
        - |
          objectName: notifications-prod-postgres-dsn
          objectType: secret
