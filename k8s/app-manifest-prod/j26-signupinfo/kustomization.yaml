apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-signupinfo (Scoutnet stats dashboard). Its secrets are Scoutnet API keys,
# identical in prod, so it reuses the dev KV objects (no SPC patch needed).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-signupinfo
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-signupinfo
    newTag: "1.0.1"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-signupinfo
      $patch: delete
  # kustomize rewrites metadata.namespace but not the ServiceMonitor's namespaceSelector content.
  - path: servicemonitor-patch.yaml
    target:
      kind: ServiceMonitor
      name: j26-signupinfo
