apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for j26-signupinfo (Scoutnet stats dashboard, FastAPI+React). No DB; secrets
# come from Azure KV via CSI. References the dev package as a base (left untouched) and patches
# only what differs in prod, per [[prod_overlay_pattern]]:
#   - namespace: j26-prod
#   - image pinned to 0.1.0 (dev base tracks :latest; NB the GHCR tag is bare 0.1.0, no leading v)
#   - ServiceMonitor: namespaceSelector restated to j26-prod (see servicemonitor-patch.yaml)
#   - ingress: dev's nginx Ingress is removed and replaced by a Traefik IngressRoute + StripPrefix
#
# No SecretProviderClass patch: both of signupinfo's secrets are Scoutnet API material (projects
# list + bodylist key), IDENTICAL in dev and prod, so prod REUSES the dev KV objects unchanged —
# the base SPC already points at them. No j26-prod-signupinfo-* KV objects are needed.
#
# Inherited unchanged from the base: the empty j26-signupinfo-config ConfigMap, and the `persist`
# hostPath volume (/var/j26/signupinfo-persist) — node-local, identical on the single prod node.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-signupinfo
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-signupinfo
    newTag: "0.1.0"

patches:
  # Delete the base nginx Ingress — prod uses a Traefik IngressRoute (different kind).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-signupinfo
      $patch: delete
  # Fix the ServiceMonitor's namespaceSelector to target j26-prod (metadata.namespace is rewritten
  # by the `namespace:` field above, but the selector content is not).
  - path: servicemonitor-patch.yaml
    target:
      kind: ServiceMonitor
      name: j26-signupinfo
