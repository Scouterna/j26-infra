# Prod route for j26-signupinfo. StripPrefix also sets X-Forwarded-Prefix, which the FastAPI app
# needs to rebuild external URLs (matches dev's rewrite-target /$2 + x-forwarded-prefix). Reuses
# the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-signupinfo-prefix
spec:
  stripPrefix:
    prefixes:
      - /_services/signupinfo
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-signupinfo
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/signupinfo`) || PathPrefix(`/_services/signupinfo/`))
      middlewares:
        - name: strip-signupinfo-prefix
      services:
        - name: j26-signupinfo
          port: 80
  tls:
    secretName: j26-app-tls-secret
