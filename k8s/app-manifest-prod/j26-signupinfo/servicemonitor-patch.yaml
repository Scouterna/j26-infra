# Restate namespaceSelector → j26-prod. kustomize rewrites metadata.namespace but not this
# selector, so without the patch the prod ServiceMonitor would still scrape the dev namespace.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: j26-signupinfo
spec:
  namespaceSelector:
    matchNames:
      - j26-prod
