# Prod route for j26-photo-permission. No StripPrefix — the app keeps its base path (built with
# J26_SERVICE_BASE_PATH=/_services/photo-permission). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: photo-permission
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/photo-permission`) || PathPrefix(`/_services/photo-permission/`))
      services:
        - name: photo-permission
          port: 80
  tls:
    secretName: j26-app-tls-secret
