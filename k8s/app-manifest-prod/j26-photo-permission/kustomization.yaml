apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-photo-permission (photo-consent frontend).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-photo-permission
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-photo-permission
    newTag: "v0.1.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: photo-permission
      $patch: delete
