apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for j26-photo-permission (photo-consent frontend, no secrets, no DB).
# References the dev package as a base (left untouched) and patches only what differs in prod,
# per the same prod-overlay pattern as the j26-app / j26-auth overlays:
#   - namespace: j26-prod
#   - image pinned to v0.1.0 (dev base tracks :latest; NB this image's GHCR tag carries the leading
#     `v` — like notifications, UNLIKE the bare 0.1.0 of map/screens/signupinfo)
#   - ingress: dev's nginx Ingress is removed and replaced by a Traefik IngressRoute (NO StripPrefix
#     — the app keeps its base path, like notification-client)
#
# Inherited unchanged from the base: J26_SERVICE_BASE_PATH=/_services/photo-permission and
# J26_SIGNUPINFO_PROXY_PREFIX=/_services/signupinfo (same paths in prod).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-photo-permission
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-photo-permission
    newTag: "v0.1.0"

patches:
  # Delete the base nginx Ingress — prod uses a Traefik IngressRoute (different kind).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: photo-permission
      $patch: delete
