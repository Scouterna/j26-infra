# Prod SPC. Unlike dev (Azure Service Connector for the DB), prod reads a single
# DATABASE_URL DSN from Key Vault via CSI, plus the app's SECRET_KEY_BASE.
# Both prod KV objects must exist before deploy:
#   j26-prod-booking-postgres-dsn, j26-prod-booking-secret-key-base
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-booking-kv-csi
spec:
  provider: azure
  secretObjects:
    - secretName: j26-booking-secrets
      type: Opaque
      data:
        - key: DATABASE_URL
          objectName: j26-prod-booking-postgres-dsn
        - key: SECRET_KEY_BASE
          objectName: j26-prod-booking-secret-key-base
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-prod-booking-postgres-dsn
          objectType: secret
        - |
          objectName: j26-prod-booking-secret-key-base
          objectType: secret
