# Prod route for j26-screens. StripPrefix because the static app is served at root (like dev's
# rewrite-target /$2). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-screens-prefix
spec:
  stripPrefix:
    prefixes:
      - /_services/screens
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-screens
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/screens`) || PathPrefix(`/_services/screens/`))
      middlewares:
        - name: strip-screens-prefix
      services:
        - name: j26-screens
          port: 80
  tls:
    secretName: j26-app-tls-secret
