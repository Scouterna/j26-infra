apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-screens (static screens-display frontend).
namespace: j26-prod

resources:
  - ../../app-manifest/j26-screens
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/j26-screens
    newTag: "0.1.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-screens
      $patch: delete
