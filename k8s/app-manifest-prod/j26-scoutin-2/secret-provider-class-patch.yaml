# Prod: the token-secret + datasource-hashing secret/salt use fresh prod KV objects (not shared
# with dev); the Scoutnet keys + Google SA reuse dev; and DATABASE_URL is added from the prod DB
# DSN (prod sources the DB via CSI instead of the dev Service Connector).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-scoutin-2-kv-csi
spec:
  secretObjects:
    - secretName: j26-scoutin-2-secrets
      type: Opaque
      data:
        - key: TOKEN_SECRET
          objectName: j26-prod-scoutin-2-token-secret
        - key: DATASOURCE_HASHING_SECRET
          objectName: j26-prod-scoutin-2-datasource-hashing-secret
        - key: DATASOURCE_HASHING_SALT
          objectName: j26-prod-scoutin-2-datasource-hashing-salt
        - key: SCOUTNET_GROUPS_GROUPS_KEY
          objectName: j26-scoutin-2-scoutnet-groups-groups-key
        - key: SCOUTNET_GROUPS_PARTICIPANTS_KEY
          objectName: j26-scoutin-2-scoutnet-groups-participants-key
        - key: SCOUTNET_GROUPS_CHECKIN_KEY
          objectName: j26-scoutin-2-scoutnet-groups-checkin-key
        - key: SCOUTNET_GROUPS_QUESTIONS_KEY
          objectName: j26-scoutin-2-scoutnet-groups-questions-key
        - key: SCOUTNET_STAFF_GROUPS_KEY
          objectName: j26-scoutin-2-scoutnet-staff-groups-key
        - key: SCOUTNET_STAFF_PARTICIPANTS_KEY
          objectName: j26-scoutin-2-scoutnet-staff-participants-key
        - key: SCOUTNET_STAFF_CHECKIN_KEY
          objectName: j26-scoutin-2-scoutnet-staff-checkin-key
        - key: SCOUTNET_STAFF_QUESTIONS_KEY
          objectName: j26-scoutin-2-scoutnet-staff-questions-key
        - key: GOOGLE_SA_KEY
          objectName: j26-scoutin-2-google-sa-key
        - key: SCOUTNET_STORMOTE6_ORDINARY_GROUPS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-groups-key
        - key: SCOUTNET_STORMOTE6_ORDINARY_PARTICIPANTS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-participants-key
        - key: SCOUTNET_STORMOTE6_ORDINARY_CHECKIN_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-checkin-key
        - key: SCOUTNET_STORMOTE6_ORDINARY_QUESTIONS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-questions-key
        - key: SCOUTNET_STORMOTE6_LATE_GROUPS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-late-groups-key
        - key: SCOUTNET_STORMOTE6_LATE_PARTICIPANTS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-late-participants-key
        - key: SCOUTNET_STORMOTE6_LATE_CHECKIN_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-late-checkin-key
        - key: SCOUTNET_STORMOTE6_LATE_QUESTIONS_KEY
          objectName: j26-scoutin-2-scoutnet-stormote6-late-questions-key
        - key: DATABASE_URL
          objectName: j26-prod-scoutin-2-postgres-dsn
  parameters:
    objects: |
      array:
        - |
          objectName: j26-prod-scoutin-2-token-secret
          objectType: secret
        - |
          objectName: j26-prod-scoutin-2-datasource-hashing-secret
          objectType: secret
        - |
          objectName: j26-prod-scoutin-2-datasource-hashing-salt
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-groups-groups-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-groups-participants-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-groups-checkin-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-groups-questions-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-staff-groups-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-staff-participants-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-staff-checkin-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-staff-questions-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-google-sa-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-groups-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-participants-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-checkin-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-ordinary-questions-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-late-groups-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-late-participants-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-late-checkin-key
          objectType: secret
        - |
          objectName: j26-scoutin-2-scoutnet-stormote6-late-questions-key
          objectType: secret
        - |
          objectName: j26-prod-scoutin-2-postgres-dsn
          objectType: secret
