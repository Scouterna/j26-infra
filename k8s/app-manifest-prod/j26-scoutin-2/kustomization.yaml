apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Self-contained prod package for j26-scoutin-2 (does NOT reference the dev base; image is
# `scoutin-2`, not j26-scoutin-2). Every manifest is a prod copy, so no dev-side change can reach
# prod — genuine dev fixes to the structural manifests / config files must be carried over
# deliberately.
namespace: j26-prod

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - secret-provider-class.yaml
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/scoutin-2
    newTag: "0.1.0"

configMapGenerator:
  - name: j26-scoutin-2-config-files
    files:
      - config/stepConfig.yml
      - config/stepConfig.pre-checkin.yml
      - config/dataSourceConfig.yml
