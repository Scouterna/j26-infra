apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for j26-scoutin-2 (check-in app; note the image is `scoutin-2`, not j26-scoutin-2).
# Unlike dev (Azure Service Connector), prod sources the DB DSN from Key Vault via CSI — see
# secret-provider-class-patch.yaml + deployment-patch.yaml.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-scoutin-2
  - ingressroute.yaml

images:
  - name: ghcr.io/scouterna/scoutin-2
    newTag: "0.1.0"

patches:
  # Replace the base nginx Ingress with a Traefik IngressRoute (see ingressroute.yaml).
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: j26-scoutin-2
      $patch: delete
  - path: secret-provider-class-patch.yaml
    target:
      kind: SecretProviderClass
      name: j26-scoutin-2-kv-csi
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: j26-scoutin-2
