# Prod route for j26-scoutin-2. No StripPrefix — the app keeps its base path (like dev's
# rewrite-target /_services/scoutin-2/$2). Reuses the app.jamboree.se TLS secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-scoutin-2
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/scoutin-2`) || PathPrefix(`/_services/scoutin-2/`))
      services:
        - name: j26-scoutin-2
          port: 80
  tls:
    secretName: j26-app-tls-secret
