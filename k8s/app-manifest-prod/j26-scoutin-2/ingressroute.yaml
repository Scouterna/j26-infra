# PRODUCTION ingress for j26-scoutin-2 — Traefik IngressRoute on app.jamboree.se/_services/scoutin-2.
# Added by the prod overlay; the base nginx Ingress is deleted ($patch: delete in kustomization.yaml).
#
# Dev does NOT strip the prefix (rewrite-target /_services/scoutin-2/$2 — keeps it), so this route
# forwards the full path with NO StripPrefix. Coexists with j26-app `/` (Traefik longest match).
# TLS reuses the existing j26-app-tls-secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: j26-scoutin-2
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.jamboree.se`) && (Path(`/_services/scoutin-2`) || PathPrefix(`/_services/scoutin-2/`))
      services:
        - name: j26-scoutin-2
          port: 80
  tls:
    secretName: j26-app-tls-secret
