# Prod: source DATABASE_URL from the CSI secret (drop the dev Service Connector secretRef) on both
# the init-migrate and app containers. (The CSI volume/mount already exist in the base.)

# --- initContainer[0]: j26-scoutin-2-init-migrate ---
- op: replace
  path: /spec/template/spec/initContainers/0/envFrom
  value:
    - configMapRef:
        name: j26-scoutin-2-config
    - secretRef:
        name: j26-scoutin-2-secrets
- op: replace
  path: /spec/template/spec/initContainers/0/env
  value:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: j26-scoutin-2-secrets
          key: DATABASE_URL

# --- container[0]: j26-scoutin-2-app ---
- op: replace
  path: /spec/template/spec/containers/0/envFrom
  value:
    - configMapRef:
        name: j26-scoutin-2-config
    - secretRef:
        name: j26-scoutin-2-secrets
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: j26-scoutin-2-secrets
          key: DATABASE_URL
