apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for j26-app. References the dev package as a base (left
# untouched) and patches only what differs in prod: namespace, image tag,
# ingress (Traefik), and a few ConfigMap values.
namespace: j26-prod

resources:
  - ../../app-manifest/j26-app

# Pinned production image tag — bumped by an explicit commit, never by the
# image updater (see prod-apps/j26-app.yaml).
images:
  - name: ghcr.io/scouterna/j26-app
    newTag: "0.2.0"

patches:
  # Strategic-merge: swap host/class/issuer/tls to Traefik (full rules restated).
  - path: ingress.yaml
    target:
      kind: Ingress
      name: j26-app
  # JSON6902: drop the base's nginx-only annotation so the rendered Traefik
  # ingress is clean (strategic-merge can't reliably delete a single map key).
  - target:
      kind: Ingress
      name: j26-app
    patch: |-
      - op: remove
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1backend-protocol

# Override only the dev-specific ConfigMap values; all other keys are inherited
# from the base ConfigMap unchanged. Merging by name into the existing
# (non-generated) ConfigMap does not add a hash suffix, so the Deployment's
# envFrom.configMapRef.name stays valid.
configMapGenerator:
  - name: j26-app-config
    behavior: merge
    literals:
      - J26_PUBLIC_PAYLOAD_API_URL=https://app.jamboree.se/_services/cms/api
      # TRIM-AND-GROW: j26-app goes to prod first, before any backend service.
      # Start with only its own app-config; append each backend's entry to this
      # list as that backend is promoted to prod. Dev's full list (for reference):
      #   /app-config.json,/_services/signupinfo/app-config,
      #   /_services/platsbank/app-config.json,/_services/notification-client/app-config,
      #   /_services/booking/api/app-config,/_services/map/app-config.json,
      #   /_services/photo-permission/app-config
      # Promoted to prod so far: notification-client, signupinfo, map, photo-permission, platsbank
      # (2026-06-29). (screens, cms, scoutin-2 are NOT here — they expose no app-config; the dev
      # list's screens-like entry is /_services/interactive-screens/api/app-config, a different app.)
      - J26_PUBLIC_APP_CONFIGS=/app-config.json,/_services/notification-client/app-config,/_services/signupinfo/app-config,/_services/map/app-config.json,/_services/photo-permission/app-config,/_services/platsbank/api/app-config
