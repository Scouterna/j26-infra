# keycloak-config-cli Job. Applies the realm/auth/scope/client config from the
# keycloak-config ConfigMap (k8s/45-keycloak-config-configmap.yaml).
#
# DEV: the Sync hook is intentionally DISABLED. The config in 45-keycloak-config-
# configmap.yaml is obsolete and the realm is now maintained by hand on dev; re-running
# config-cli on every sync would clobber those manual changes. Without the
# `argocd.argoproj.io/hook` annotation ArgoCD treats the completed Job as ordinary
# desired-state and never re-runs it (selfHeal won't recreate a finished Job). The Job
# still runs once on a fresh namespace to bootstrap the realm. To re-enable continuous
# config management, fix the ConfigMap and restore the hook annotations below.
#
# Original hook lifecycle (kept for reference / prod parity):
#   hook: Sync — re-runs on every ArgoCD sync (picks up config changes).
#   hook-delete-policy: BeforeHookCreation — deletes the old Job before each run,
#     same as the manual `kubectl delete job … --ignore-not-found` in apply.sh.
#
# No explicit wait needed: KEYCLOAK_AVAILABILITYCHECK_ENABLED polls until Keycloak
# answers (up to 300s), so apply order between Deployment and this Job doesn't matter.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config
  namespace: j26-keycloak-scoutid
spec:
  # DEV: fully disabled — a suspended Job never creates pods, so config-cli never runs
  # (not even once), regardless of ArgoCD sync/selfHeal recreating the Job object.
  # This is the actual kill switch; removing the hook annotation alone was not enough,
  # because ttlSecondsAfterFinished deletes the finished Job and selfHeal recreates it.
  # To re-enable, set this to false (or remove it) and restore the hook annotations.
  suspend: true
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: keycloak-config
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-config-cli
          image: docker.io/adorsys/keycloak-config-cli:latest-26
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-csi
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-csi
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: "300s"
            - name: IMPORT_FILES_LOCATIONS
              value: /config/*
            - name: J26_NOTIFICATIONS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secrets-csi
                  key: J26_NOTIFICATIONS_CLIENT_SECRET
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: client-secrets
              mountPath: /mnt/client-secrets
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: keycloak-config
        - name: client-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: j26-keycloak-scoutid-kv-csi
