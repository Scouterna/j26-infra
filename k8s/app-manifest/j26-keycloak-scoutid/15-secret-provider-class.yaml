# Azure Key Vault CSI driver — sources all cluster secrets for this app from
# kv-j26apps-shared-sdc, the same pattern used by every other J26 app
# (see e.g. j26-infra/k8s/app-manifest/j26-signupinfo/secret-provider-class.yaml).
#
# Mounting this SecretProviderClass's volume in a pod is what triggers the CSI
# driver to materialize the two Secrets below (keycloak-db-csi, keycloak-admin-csi).
# These are NEW Secret names (not the old keycloak-db/keycloak-admin) so the CSI
# driver never has to contend with a pre-existing manually-applied Secret of the
# same name (it refuses to adopt one). The old Secrets get a one-time
# `kubectl delete --ignore-not-found` cleanup during rollout, not here.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-keycloak-scoutid-kv-csi
  namespace: j26-keycloak-scoutid
spec:
  provider: azure
  secretObjects:
    - secretName: keycloak-db-csi
      type: Opaque
      data:
        - key: KC_DB_USERNAME
          objectName: j26-dev-scoutid-postgres-user
        # NOTE: this image's Keycloak 26.5.6 does not honor the documented
        # KCRAW_DB_PASSWORD prefix (verified) — plain KC_DB_PASSWORD works and is
        # what 20-keycloak.yaml consumes. The underlying password has no $ anyway.
        - key: KC_DB_PASSWORD
          objectName: j26-dev-scoutid-postgres-password
    - secretName: keycloak-admin-csi
      type: Opaque
      data:
        - key: KC_BOOTSTRAP_ADMIN_USERNAME
          objectName: j26-dev-scoutid-keycloak-bootstrap-admin-username
        - key: KC_BOOTSTRAP_ADMIN_PASSWORD
          objectName: j26-dev-scoutid-keycloak-bootstrap-admin-password
        - key: MASTER_ADMIN_USERNAME
          objectName: j26-dev-scoutid-keycloak-master-admin-username
        - key: MASTER_ADMIN_PASSWORD
          objectName: j26-dev-scoutid-keycloak-master-admin-password
    - secretName: keycloak-client-secrets-csi
      type: Opaque
      data:
        - key: J26_NOTIFICATIONS_CLIENT_SECRET
          objectName: j26-dev-notifications-keycloak-client-secret
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-dev-scoutid-postgres-user
          objectType: secret
        - |
          objectName: j26-dev-scoutid-postgres-password
          objectType: secret
        - |
          objectName: j26-dev-scoutid-keycloak-bootstrap-admin-username
          objectType: secret
        - |
          objectName: j26-dev-scoutid-keycloak-bootstrap-admin-password
          objectType: secret
        - |
          objectName: j26-dev-scoutid-keycloak-master-admin-username
          objectType: secret
        - |
          objectName: j26-dev-scoutid-keycloak-master-admin-password
          objectType: secret
        - |
          objectName: j26-dev-notifications-keycloak-client-secret
          objectType: secret
