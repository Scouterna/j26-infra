apiVersion: apps/v1
kind: Deployment
metadata:
  name: j26-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: j26-app
  template:
    metadata:
      labels:
        app: j26-app
    spec:
      containers:
        - name: j26-app
          image: ghcr.io/scouterna/j26-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: j26-app-config
            - secretRef:
                name: j26-app-secrets
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: j26-app-kv-csi
