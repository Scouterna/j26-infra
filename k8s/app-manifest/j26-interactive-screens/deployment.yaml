apiVersion: apps/v1
kind: Deployment
metadata:
  name: j26-interactive-screens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: j26-interactive-screens
  template:
    metadata:
      labels:
        app: j26-interactive-screens
    spec:
      initContainers:
        - name: j26-interactive-screens-init-migrate
          image: ghcr.io/scouterna/j26-interactive-screens-v2:latest
          command: ["node_modules/.bin/tsx", "packages/server/src/migrate.ts"]
          envFrom:
            - configMapRef:
                name: j26-interactive-screens-config
            - secretRef:
                name: sc-postgresqlfbac0-secret
          env:
            - name: DATABASE_URL
              value: "postgresql://$(AZURE_POSTGRESQL_USER):$(AZURE_POSTGRESQL_PASSWORD)@$(AZURE_POSTGRESQL_HOST):$(AZURE_POSTGRESQL_PORT)/$(AZURE_POSTGRESQL_DATABASE)?sslmode=require"
      containers:
        - name: j26-interactive-screens-app
          image: ghcr.io/scouterna/j26-interactive-screens-v2:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: j26-interactive-screens-config
            - secretRef:
                name: sc-postgresqlfbac0-secret
          env:
            - name: DATABASE_URL
              value: "postgresql://$(AZURE_POSTGRESQL_USER):$(AZURE_POSTGRESQL_PASSWORD)@$(AZURE_POSTGRESQL_HOST):$(AZURE_POSTGRESQL_PORT)/$(AZURE_POSTGRESQL_DATABASE)?sslmode=require"
