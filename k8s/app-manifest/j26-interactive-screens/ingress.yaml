apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: j26-interactive-screens
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /_services/interactive-screens/$2
spec:
  ingressClassName: nginx
  rules:
    - host: app.dev.j26.se
      http:
        paths:
          - path: /_services/interactive-screens(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: j26-interactive-screens
                port:
                  number: 80
