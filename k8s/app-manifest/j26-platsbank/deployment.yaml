apiVersion: apps/v1
kind: Deployment
metadata:
  name: j26-platsbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: j26-platsbank
  template:
    metadata:
      labels:
        app: j26-platsbank
    spec:
      initContainers:
        - name: j26-platsbank-init-migrate
          image: ghcr.io/scouterna/j26-platsbank:latest
          command: ["node_modules/.bin/prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: j26-platsbank-config
            - secretRef:
                name: sc-postgresql0a6a9-secret
          env:
            - name: DATABASE_URL
              value: "postgresql://$(AZURE_POSTGRESQL_USER)@$(AZURE_POSTGRESQL_HOST):$(AZURE_POSTGRESQL_PORT)/$(AZURE_POSTGRESQL_DATABASE)?sslmode=require"
      containers:
        - name: j26-platsbank-app
          image: ghcr.io/scouterna/j26-platsbank:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: j26-platsbank-config
            - secretRef:
                name: sc-postgresql0a6a9-secret
          env:
            - name: DATABASE_URL
              value: "postgresql://$(AZURE_POSTGRESQL_USER)@$(AZURE_POSTGRESQL_HOST):$(AZURE_POSTGRESQL_PORT)/$(AZURE_POSTGRESQL_DATABASE)?sslmode=require"
