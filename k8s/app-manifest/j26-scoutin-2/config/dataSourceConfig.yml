      includeIndividuals: true
      includeGroups: false
      keys:
        groups: ${SCOUTNET_STORMOTE6_LATE_GROUPS_KEY}
        participants: ${SCOUTNET_STORMOTE6_LATE_PARTICIPANTS_KEY}
        checkin: ${SCOUTNET_STORMOTE6_LATE_CHECKIN_KEY}
        questions: ${SCOUTNET_STORMOTE6_LATE_QUESTIONS_KEY}

  groups:
