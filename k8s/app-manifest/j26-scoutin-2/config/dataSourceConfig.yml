  stormote6_ordinary:
    name:
      sv: deltagare på Stormöte 6
      en: deltagare på Stormöte 6
    provider: scoutnet
    providerOptions:
      projectId: 72237
      includeIndividuals: true
      includeGroups: false
      keys:
        groups: ${SCOUTNET_STORMOTE6_ORDINARY_GROUPS_KEY}
        participants: ${SCOUTNET_STORMOTE6_ORDINARY_PARTICIPANTS_KEY}
        checkin: ${SCOUTNET_STORMOTE6_ORDINARY_CHECKIN_KEY}
        questions: ${SCOUTNET_STORMOTE6_ORDINARY_QUESTIONS_KEY}

  stormote6_late:
