dataSources:
  staff:
    name:
      sv: funktionär
      en: staff (IST)
    provider: scoutnet
    enrichWith:
      safeFromHarm: scoutnet:safeFromHarm
      criminalRecordExtract: scoutnet:criminalRecordExtract
      # Question IDs are specific to this project's registration form (see
      # plugins/jamboree26/question-ids.md for the source list from the
      # Scoutnet project admin). Field names are a code contract with
      # plugins/jamboree26/src/specialNeeds (grouping logic there matches
      # these names, not the numeric IDs).
      specialNeeds:
        name: jamboree26:specialNeeds
        options:
          questions:
            # Vilka hela perioder personen önskar delta i (multiselect: Förläger/Lägerperiod/Efterläger) - se plugins/jamboree26/src/specialNeeds
            periodsAttending: "90174"
            # Frånvaro: kan inte delta alla dagar (checkbox) + vilka dagar (multiselect), per period
            absenceForlagerLimited: "90175"
            absenceForlagerDays: "90176"
            absenceLagerperiodLimited: "90179"
            absenceLagerperiodDays: "90180"
            absenceEfterlagerLimited: "90181"
            absenceEfterlagerDays: "90183"
            # Medicinskt behov av el vid boplatsen
            medicalElectricity: "88329"
            # Specialkost: en checkbox per allergen/behov, plus fritext
            dietGluten: "88306"
            dietLaktos: "88285"
            dietMjolkprotein: "88287"
            dietAgg: "88279"
            dietSoja: "88300"
            dietFisk: "88271"
            dietKraftdjur: "88308"
            dietBlotdjur: "88305"
            dietNotter: "89332"
            dietSesam: "89333"
            dietSelleri: "89334"
            dietSenap: "89335"
            dietSulfit: "89336"
            dietNotkott: "89337"
            dietFlaskkott: "89340"
            dietHalal: "89341"
            dietVegan: "89342"
            dietLaktoOvoVegetarian: "89343"
            dietPescetarian: "89344"
            dietOther: "88286"
    providerOptions:
      projectId: 52716
      feeIds:
        - 32207
      includeIndividuals: true
      includeGroups: false
      keys:
        groups: ${SCOUTNET_STAFF_GROUPS_KEY}
        participants: ${SCOUTNET_STAFF_PARTICIPANTS_KEY}
        checkin: ${SCOUTNET_STAFF_CHECKIN_KEY}
        questions: ${SCOUTNET_STAFF_QUESTIONS_KEY}
