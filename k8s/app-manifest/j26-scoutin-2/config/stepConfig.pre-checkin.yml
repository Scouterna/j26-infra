steps:
  - uses: base:identify
    id: identify
    with:
      identifierHint: ${{ session.params.membershipNumber }}
      skipConfirmation: true
      dataSources:
        - groups

  - if: |
      ${{
        steps.identify.outputs.dataSource == 'groups' &&
        steps.identify.outputs.participant.subGroup != 'leader'
      }}
    uses: base:block
    with:
      title: "Du kan inte checka in"
      message: "Endast ledare kan checka in deltagare."

  - uses: base:deduplicateSession
    with:
      force: resume

  - uses: base:selectSubjects

  - uses: base:markPreliminaryCheckedIn
    required: true

  - uses: base:message
    with:
      title: Tack!
      message: Nu är du klar för tillfället. Glöm inte slutföra incheckningen när ni väl är på lägerområdet!
