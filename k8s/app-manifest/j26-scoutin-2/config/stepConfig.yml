# Steps are executed in order. Each step can produce outputs that can be used
# by later steps.
#
# The output of each step is persisted in the checkin session. This way the flow
# can be resumed if interrupted.
steps:
  # The identify step prompts the user to identify themselves. If the user
  # exists in multiple data sources, the user will be prompted to select which
  # one to use.
  - uses: base:identify
    id: identify
    with:
      scannerSide: right

  - if: |
      ${{
        steps.identify.outputs.dataSource == 'groups' &&
        steps.identify.outputs.participant.subGroup != 'leader'
      }}
    uses: base:block
    with:
      title: "Du kan inte checka in"
      message: "Endast ledare kan checka in deltagare."

  # deduplicateSession will ensure that there is only one session active for the
  # actor. If there are any other sessions the user is prompted to "Pick up
  # where you left off" or "Start over". If the user chooses to start over, the
  # old session is deleted. If the user chooses to pick up where they left off,
  # the current flow is aborted and the old session is resumed.
  - uses: base:deduplicateSession
    with:
      force: ${{ steps.identify.outputs.dataSource == 'stormote6_ordinary' && 'new' || null }}

  - if: |
      ${{
        steps.identify.outputs.dataSource == 'staff' ||
        steps.identify.outputs.dataSource == 'staffChildren' ||
        steps.identify.outputs.dataSource == 'stormote6_ordinary'
      }}
    # setActorAsSubject sets the session.subjects to the actorId from the session.
    uses: base:setActorAsSubject

  - if: |
      ${{
        steps.identify.outputs.dataSource == 'staff' ||
        steps.identify.outputs.dataSource == 'staffChildren' ||
        steps.identify.outputs.dataSource == 'stormote6_ordinary'
      }}
    # Self-checkin only: warns and asks for confirmation if this person is
    # already checked in. Not used for the groups flow, where a leader
    # completing another session is expected - there is no "done" state to
    # protect there.
    uses: base:confirmReCheckin

  - if: ${{ steps.identify.outputs.dataSource == 'staff' }}
    # Compliance gate: blocks unless both Safe from Harm (Trygga Möten) and
    # the criminal record extract (registerutdrag) are OK (computed at import
    # time by the scoutnet:safeFromHarm / scoutnet:criminalRecordExtract
    # enrichers, see dataSourceConfig.yml). Runs before any data display per
    # the staff check-in flow design - a failure should abort cheaply, not
    # after collecting/showing other info.
    uses: scoutnet:complianceGate
    with:
      # Trygga Möten is valid for 3 years from completion. Set to null to
      # disable the expiry check.
      safeFromHarmValidYears: 3
      # Registerutdrag has no expiry by default. Set a number of years to
      # enforce one (validity is measured from the date it was shown).
      criminalRecordExtractValidYears: 3
      # Date (YYYY-MM-DD) validity is checked against - e.g. the event's end
      # date, so records must stay valid until then. Defaults to today.
      checkDate: "2026-08-01"

  - if: ${{ steps.identify.outputs.dataSource == 'staff' }}
    # Informational only (never blocks): shows the person their own
    # registered special needs (diet, medical, period), computed at import
    # time by the jamboree26:specialNeeds enricher from Scoutnet registration
    # answers (see dataSourceConfig.yml). Skips silently when nothing is
    # registered. Placed after the compliance gate so a blocked person never
    # reaches it.
    uses: jamboree26:specialNeeds
    id: specialNeedsStaff

  - if: ${{ steps.identify.outputs.dataSource == 'staff' }}
    # Hands out an RFID tag to the checking-in staff member: the operator scans
    # a tag (keyboard-wedge reader, ends with Enter) and it's bound to this
    # person. Warns if they already have a tag; rejects a tag already bound to
    # someone else. Staff-only (single-person self-check-in). The mapping lives
    # under the jamboree26:rfid key in Participant.resultData - no
    # feature-specific schema. Placed after the compliance gate so a blocked
    # person never reaches it.
    uses: jamboree26:rfid
    id: rfidStaff

  - if: ${{ steps.identify.outputs.dataSource == 'staffChildren' }}
    # Same informational special-needs screen for staff children. No compliance
    # gate precedes it (children never face one - see the gate step above).
    # Diet and medical are shown identically to staff; only attendance differs
    # (a single positive attend-list), selected via `variant: child`. The child
    # form's differing question IDs are mapped onto the shared field names in
    # dataSourceConfig.yml (staffChildren.enrichWith.specialNeeds).
    uses: jamboree26:specialNeeds
    id: specialNeedsChild
    with:
      variant: child

  - if: ${{ steps.identify.outputs.dataSource == 'groups' }}
    # selectSubjects will automatically use the actorId from the session to
    # determine which members they can select, so we don't need to pass it
    # explicitly here.
    uses: base:selectSubjects

  - uses: base:markConfirmedCheckedIn
    required: true
