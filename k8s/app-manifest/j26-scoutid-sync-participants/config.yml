assignments:
# Uses GitHub Actions expression syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/expressions

# 32341: Ledare
# 32349: Ledare kortvecka (ons-lör)
# 32348: Ledarfunktionär

# j26-leader: all leader fee types.
- groups: [j26-leader]
  if: "contains(fromJSON('[32341, 32349, 32348]'), fee.id)"

# j26-leader/j26-rover: leaders who have opted into the rover programme.
- groups: [j26-leader]
  dynamicGroups:
    - parent: j26-leader
      nameExpression: "'j26-rover'"
  if: |
    contains(fromJSON('[32341, 32349, 32348]'), fee.id) &&
    getAnswer('Jamboree26:s frågor', 'Extra frågor för ledare', 'Roverprogram') == 'checked'

# j26-leader-staff: Ledarfunktionär only.
# 32348: Ledarfunktionär
- groups: [j26-leader-staff]
  if: "fee.id == 32348"

- groups: []
  dynamicGroups:
    - parent: j26-groups
      nameExpression: "group_id"
  if: "group_id"

- groups: []
  dynamicGroups:
    - parent: j26-villages
      nameExpression: "lookup('group_mappings.csv', 'village_number', group_id)"
  if: "lookup('group_mappings.csv', 'village_number', group_id)"

- groups: []
  dynamicGroups:
    - parent: j26-districts
      nameExpression: "lookup('group_mappings.csv', 'district', group_id)"
  if: "lookup('group_mappings.csv', 'district', group_id)"
