apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-reports-kv-csi
spec:
  provider: azure
  secretObjects:
  - secretName: j26-reports-secrets
    type: Opaque
    data:
    - key: STAFF_MEMBER_KEY
      objectName: j26-reports-staff-member-key
    - key: STAFF_QUESTION_KEY
      objectName: j26-reports-staff-question-key
    - key: PARTICIPANTS_MEMBER_KEY
      objectName: j26-reports-participants-member-key
    - key: PARTICIPANTS_QUESTION_KEY
      objectName: j26-reports-participants-question-key
    - key: PARTICIPANTS_GROUP_KEY
      objectName: j26-reports-participants-group-key
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects: |
      array:
        - |
          objectName: j26-reports-staff-member-key
          objectType: secret
        - |
          objectName: j26-reports-staff-question-key
          objectType: secret
        - |
          objectName: j26-reports-participants-member-key
          objectType: secret
        - |
          objectName: j26-reports-participants-question-key
          objectType: secret
        - |
          objectName: j26-reports-participants-group-key
          objectType: secret
