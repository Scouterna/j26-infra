apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: j26-notifications-kv-csi
spec:
  provider: azure
  secretObjects:
  - secretName: notification-secrets
    type: Opaque
    data:
    - key: FCM_CREDENTIALS_JSON
      objectName: notifications-fcm-credentials-json
    - key: KC_SA_ACCOUNT_KEY
      objectName: j26-dev-notifications-keycloak-client-secret
    - key: POSTGRES_DSN
      objectName: notifications-postgres-dsn
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: 214abfc2-fa80-44b9-89c5-f78444a16816
    keyvaultName: kv-j26apps-shared-sdc
    tenantId: 317a47ba-fd32-41b8-8ebe-310a1adc9863
    objects:  |
      array:
        - |
          objectName: notifications-fcm-credentials-json
          objectType: secret
        - |
          objectName: j26-dev-notifications-keycloak-client-secret
          objectType: secret
        - |
          objectName: notifications-postgres-dsn
          objectType: secret
